name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual release)'
        type: boolean
        required: false
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.25.0'
          cache: true

      - name: Compute version
        id: version
        run: |
          FULL_VERSION=$(scripts/auto-version.sh)
          # Extract semver portion (before the +)
          SEMVER="${FULL_VERSION%%+*}"
          if [[ ! "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver: $SEMVER (from $FULL_VERSION)"
            exit 1
          fi
          TAG="v${SEMVER}"
          COMMIT_HASH=$(git rev-parse --short=12 HEAD)
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Version: $FULL_VERSION"
          echo "Tag: $TAG"

      - name: Check tag and release state
        id: check_tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags origin
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi
          # Distinguish "release not found" (404) from transient API errors so
          # we don't silently treat auth/rate-limit failures as "missing release"
          # and accidentally re-run goreleaser against an existing release.
          RELEASE_ERR=$(mktemp)
          if gh release view "$TAG" >/dev/null 2>"$RELEASE_ERR"; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG and its release both exist, skipping release."
          elif grep -qiE 'release not found|not found|HTTP 404' "$RELEASE_ERR"; then
            echo "release_exists=false" >> $GITHUB_OUTPUT
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG exists without a release — will retry goreleaser."
            fi
          else
            echo "ERROR: gh release view failed for unexpected reason:" >&2
            cat "$RELEASE_ERR" >&2
            rm -f "$RELEASE_ERR"
            exit 1
          fi
          rm -f "$RELEASE_ERR"

      - name: Run tests
        run: make test

      - name: Create tag
        if: steps.check_tag.outputs.tag_exists == 'false' && inputs.dry_run != true
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG" 2>&1 || {
            # If push fails, check if tag was created by a concurrent run AND
            # that it points at our HEAD. If it points elsewhere, the two runs
            # computed the same version for different commits — fail loudly
            # rather than release a binary that doesn't match the tag.
            git fetch --tags origin
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              TAG_COMMIT=$(git rev-parse "$TAG^{commit}")
              HEAD_COMMIT=$(git rev-parse HEAD)
              if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
                echo "ERROR: Tag $TAG exists on remote but points to $TAG_COMMIT, not HEAD ($HEAD_COMMIT)"
                exit 1
              fi
              echo "Tag $TAG was already pushed by a concurrent run at the same commit, continuing."
            else
              echo "ERROR: Failed to push tag $TAG"
              exit 1
            fi
          }

      - name: Dry run summary
        if: inputs.dry_run == true
        env:
          TAG: ${{ steps.version.outputs.tag }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
        run: |
          echo "DRY RUN: would have created tag $TAG (version: $FULL_VERSION)"

      - name: Run goreleaser
        if: steps.check_tag.outputs.release_exists == 'false' && inputs.dry_run != true
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
