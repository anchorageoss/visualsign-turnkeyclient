name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual release)'
        required: false
        default: 'false'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: '1.25.0'
          cache: true

      - name: Compute version
        id: version
        run: |
          FULL_VERSION=$(scripts/auto-version.sh)
          # Extract semver portion (before the +)
          SEMVER="${FULL_VERSION%%+*}"
          if [[ ! "$SEMVER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid semver: $SEMVER (from $FULL_VERSION)"
            exit 1
          fi
          TAG="v${SEMVER}"
          COMMIT_HASH=$(git rev-parse --short=12 HEAD)
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "Version: $FULL_VERSION"
          echo "Tag: $TAG"

      - name: Check if tag already exists
        id: check_tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: make test

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG" 2>&1 || {
            # If push fails, check if tag was created by a concurrent run
            git fetch --tags origin
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG was already pushed by a concurrent run, skipping."
            else
              echo "ERROR: Failed to push tag $TAG"
              exit 1
            fi
          }

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
        run: |
          echo "DRY RUN: would have created tag $TAG (version: $FULL_VERSION)"

      - name: Run goreleaser
        if: steps.check_tag.outputs.exists == 'false' && github.event.inputs.dry_run != 'true'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.version.outputs.tag }}
          COMMIT_HASH: ${{ steps.version.outputs.commit_hash }}
